<!DOCTYPE html>
<html>
<head>
    <title>Ecuatrade - Registrar Producto</title>
</head>
<body>
    <h1>Registrar Nuevo Producto</h1>
    
    <form method="POST">
        {% csrf_token %} <label>Nombre del Producto:</label><br>
        <input type="text" name="nombre_producto" required><br><br>

        <label>Precio:</label><br>
        <input type="number" step="0.01" name="precio" required><br><br>

        <label>Stock Inicial:</label><br>
        <input type="number" name="stock" value="0"><br><br>

        <button type="submit">Guardar en Inventario</button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}
</body>
</html>
